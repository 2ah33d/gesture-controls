[virtual_box]
preset = medium
custom_width = 0.55
custom_height = 0.45

[hand]
preferred = right

[thresholds]
pinch_threshold = 0.25
release_threshold = 0.35
confidence_min = 0.7
debounce_frames = 1
release_debounce_frames = 1

[smoothing]
min_cutoff = 0.4
beta = 0.7
d_cutoff = 1.0
dead_zone_px = 3

[cursor]
tracking_landmark = palm_center
mirror_x = true

[scroll]
sensitivity = 5.0
natural = true

[toggle]
hotkey = ctrl+alt+g

[debug]
enabled = true
